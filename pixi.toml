[workspace]
name = "herdbot"
version = "0.1.0"
description = "A Telegram bot that downloads files/torrents and uploads them to Google Drive"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11"
aria2 = ">=1.36"
rclone = ">=1.60"
python-dotenv = ">=1.0"
ruff = ">=0.3"
pyright = ">=1.1"

[pypi-dependencies]
telethon = ">=1.35"
cryptg = ">=0.4"

[tasks]
start-bot = "python bot.py"
config-gdrive = "rclone config"
lint = "ruff check"
typecheck = "pyright"
check = { depends-on = ["lint", "typecheck"] }
