[workspace]
name = "herdbot"
version = "0.1.0"
description = "A Telegram bot that downloads files/torrents and uploads them to Google Drive"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "==3.14.6"
aria2 = "==1.37.0"
rclone = "==1.74.3"
python-dotenv = "==1.2.2"

[pypi-dependencies]
telethon = "==1.44.0"
cryptg = "==0.6.0"

[feature.dev.dependencies]
ruff = "==0.15.20"
pyright = "==1.1.411"

[environments]
default = { features = [] }
dev = { features = ["dev"] }

[tasks]
start-bot = "python bot.py"
config-gdrive = "rclone config"
docker-build = "docker compose build"
docker-up = { cmd = "touch bot.session && touch bot.session-journal && docker compose up -d", depends-on = ["docker-build"] }
docker-down = "docker compose down"
docker-restart = "docker compose restart"
docker-logs = "docker compose logs -f"
docker-update = { cmd = "docker compose pull && touch bot.session && touch bot.session-journal && docker compose up -d --build herdbot" }

[feature.dev.tasks]
lint = "ruff check"
typecheck = "pyright"
check = { depends-on = ["lint", "typecheck"] }
